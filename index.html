<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ShopSync</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>ShopSync</h1>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
            <a href="profile.html">Profile</a>
            <a href="login.html">Login</a>
        </nav>

    </header>
    <section class="hero">
        <h2>Buy with ShopSync</h2>
        <div class="search-box">
            <input type="text" placeholder="Search for products...">
            <button>Search</button>
        </div>
    </section>

    <section class="featured">
        <h2> Featured Listings</h2>
        <div class="items">
            <div class="item-card">
                <img src="images/laptop.webp" width="200">
                <h3>New HP Chromebook 14-inch Laptop</h3>
                <p><strong>$400</strong></p>
            </div>
            <div class="item-card">
                <img src="images/iphone.jpg" width="200">
                <h3>Refurbished iPhone 14 Pro Max</h3>
                <p><strong>$750</strong></p>
            </div>
            <div class="item-card">
                <img src="images/eiffel.webp" width="200">
                <h3> New Eiffel Tower Lego Set</h3>
                <p><strong>$630</strong></p>
            </div>
        </div>
    </section>
    <footer>
        <p>© 2026 ShopSync. All rights reserved.</p>
    </footer>
</body>

</html>
