<!DOCTYPE html>
<html>
<head>
    <title>ShopSync - Browse</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>

<header>
    <h1>ShopSync</h1>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
        <a href="profile.html">Profile</a>
        <span id="auth-link"></span>
        <a href="cart.html" id="cart-link">Cart</a>
    </nav>
</header>

<h2>Browse Items</h2>

<div class="search-box">
    <input type="text" placeholder="Search for products...">
    <button onclick="searchItems()">Search</button>
</div>

<section class="items">

<div class="item-card">
    <img src="images/laptop.webp" width="200" onclick="addToCart('HP Chromebook', 400, 'images/laptop.webp')">
    <h3>New HP Chromebook 14-inch Laptop</h3>
    <p><strong>$400</strong></p>
</div>

<div class="item-card">
    <img src="images/iphone.jpg" width="200" onclick="addToCart('iPhone 14 Pro Max', 750, 'images/iphone.jpg')">
    <h3>Refurbished Iphone 14 Pro Max</h3>
    <p><strong>$750</strong></p>
</div>

<div class="item-card">
    <img src="images/eiffel.webp" width="200" onclick="addToCart('Eiffel Tower Lego Set', 630, 'images/eiffel.webp')">
    <h3>New Eiffel Tower Lego Set</h3>
    <p><strong>$630</strong></p>
</div>

<div class="item-card">
    <img src="images/headphones.avif" width="200" onclick="addToCart('JBL Live 770NC Headphones', 200, 'images/headphones.avif')">
    <h3>JBL Live 770NC Wireless Headphones</h3>
    <p><strong>$200</strong></p>
</div>

<div class="item-card">
    <img src="images/camera.avif" width="200" onclick="addToCart('Canon EOS Rebel DSLR Camera', 500, 'images/camera.avif')">
    <h3>Canon EOS Rebel DSLR Camera</h3>
    <p><strong>$500</strong></p>
</div>

<div class="item-card">
    <img src="images/ps5.webp" width="200" onclick="addToCart('PlayStation 5 Slim', 450, 'images/ps5.webp')">
    <h3>Sony PlayStation 5 Slim Console</h3>
    <p><strong>$450</strong></p>
</div>

</section>

</body>
</html>
