<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ShopSync - Profile</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>

    <header>
        <h1>ShopSync</h1>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
            <a href="profile.html">Profile</a>
            <span id="auth-link"></span>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <section class="profile-info">
        <h2>My Profile</h2>
        <div class="profile-card">
        <button onclick="logout()">Sign Out</button>
            
        </div>
    </section>

    <section class="profile-orders">
        <h2>Order History</h2>
        <div class="items">
            <div class="item-card">
                <img src="images/laptop.webp" width="200">
                <h3>New HP Chromebook 14-inch Laptop</h3>
                <p><strong>$400</strong></p>
                <p>Ordered: March 1, 2025</p>
            </div>
            <div class="item-card">
                <img src="images/iphone.jpg" width="200">
                <h3>Refurbished iPhone 14 Pro Max</h3>
                <p><strong>$750</strong></p>
                <p>Ordered: February 14, 2025</p>
            </div>
        </div>
    </section>

    <section class="profile-listings">
        <h2>My Listings</h2>
        <div class="items">
            <div class="item-card">
                <img src="images/eiffel.webp" width="200">
                <h3>New Eiffel Tower Lego Set</h3>
                <p><strong>$630</strong></p>
                <p>Status: Active</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 ShopSync. All rights reserved.</p>
    </footer>

</body>

</html>
